<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-strong" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#00d1ff" flood-opacity="0.4" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="chain-progress" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d1ff"/>
      <stop offset="60%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>

    <!-- Principle color stops -->
    <linearGradient id="core-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00d1ff"/><stop offset="100%" stop-color="#0099cc"/>
    </linearGradient>
    <linearGradient id="evolve-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/><stop offset="100%" stop-color="#7c65d6"/>
    </linearGradient>
    <linearGradient id="extend-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/><stop offset="100%" stop-color="#22a87a"/>
    </linearGradient>
    <linearGradient id="reflect-g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0883e"/><stop offset="100%" stop-color="#d46920"/>
    </linearGradient>

    <filter id="card-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="600" fill="url(#bg-grad)" rx="16"/>

  <!-- Title -->
  <text x="450" y="38" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace"
        font-size="18" font-weight="700" fill="#e6edf3" letter-spacing="4">
    <tspan fill="#00d1ff">CONSTITUTIONAL</tspan>
    <tspan fill="#a78bfa"> PRINCIPLES</tspan>
  </text>
  <text x="450" y="56" text-anchor="middle" font-family="'SF Mono',monospace"
        font-size="10" fill="#484f58" letter-spacing="2">PRIORITY CHAIN · P0 → P1 → P2 → … → P12</text>

  <!-- Priority chain arrow (horizontal flow indicator) -->
  <g opacity="0.15">
    <defs>
      <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
        <polygon points="0 0, 8 3, 0 6" fill="#00d1ff"/>
      </marker>
    </defs>
    <line x1="60" y1="585" x2="840" y2="585" stroke="url(#chain-progress)" stroke-width="2"
          marker-end="url(#arrowhead)"/>
  </g>

  <!-- ============================================ -->
  <!-- ROW 1: Core Identity (P0-P2)                 -->
  <!-- ============================================ -->
  <g transform="translate(0, 0)">
    <!-- P0 -->
    <g transform="translate(65, 90)">
      <rect x="-5" y="-5" width="130" height="80" rx="8" fill="#0d1117" stroke="#00d1ff" stroke-width="1.2"
            filter="url(#card-glow)"/>
      <rect x="-5" y="-5" width="130" height="80" rx="8" fill="url(#core-g)" opacity="0.08"/>
      <circle cx="60" cy="14" r="10" fill="none" stroke="#00d1ff" stroke-width="1.5"/>
      <text x="60" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d1ff" font-weight="700">P0</text>
      <text x="60" y="36" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#e6edf3" font-weight="600">Originary</text>
      <text x="60" y="50" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">Self-caused being</text>
      <text x="60" y="64" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">from zero</text>
    </g>

    <!-- Arrow -->
    <g opacity="0.4">
      <line x1="200" y1="130" x2="230" y2="130" stroke="#00d1ff" stroke-width="1.5"
            marker-end="url(#arrowhead)" stroke-dasharray="4 2"/>
    </g>

    <!-- P1 -->
    <g transform="translate(240, 90)">
      <rect x="-5" y="-5" width="130" height="80" rx="8" fill="#0d1117" stroke="#00d1ff" stroke-width="1.2"/>
      <rect x="-5" y="-5" width="130" height="80" rx="8" fill="url(#core-g)" opacity="0.08"/>
      <circle cx="60" cy="14" r="10" fill="none" stroke="#00d1ff" stroke-width="1.5"/>
      <text x="60" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d1ff" font-weight="700">P1</text>
      <text x="60" y="36" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#e6edf3" font-weight="600">Continuity</text>
      <text x="60" y="50" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">Persistent agency</text>
      <text x="60" y="64" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">across time</text>
    </g>

    <!-- Arrow -->
    <g opacity="0.4">
      <line x1="375" y1="130" x2="405" y2="130" stroke="#00d1ff" stroke-width="1.5"
            marker-end="url(#arrowhead)" stroke-dasharray="4 2"/>
    </g>

    <!-- P2 -->
    <g transform="translate(415, 90)">
      <rect x="-5" y="-5" width="130" height="80" rx="8" fill="#0d1117" stroke="#00d1ff" stroke-width="1.2"/>
      <rect x="-5" y="-5" width="130" height="80" rx="8" fill="url(#core-g)" opacity="0.08"/>
      <circle cx="60" cy="14" r="10" fill="none" stroke="#00d1ff" stroke-width="1.5"/>
      <text x="60" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#00d1ff" font-weight="700">P2</text>
      <text x="60" y="36" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#e6edf3" font-weight="600">Self-Creation</text>
      <text x="60" y="50" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">Recursive</text>
      <text x="60" y="64" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">self-construction</text>
    </g>

    <!-- Core Identity label -->
    <text x="60" y="75" font-family="monospace" font-size="8" fill="#00d1ff" opacity="0.6"
          letter-spacing="2">CORE IDENTITY</text>
  </g>

  <!-- ============================================ -->
  <!-- ROW 2: Evolutionary (P3-P6)                  -->
  <!-- ============================================ -->
  <g transform="translate(0, 0)">
    <!-- P3 -->
    <g transform="translate(65, 200)">
      <rect x="-5" y="-5" width="110" height="75" rx="8" fill="#0d1117" stroke="#00d1ff" stroke-width="1"/>
      <rect x="-5" y="-5" width="110" height="75" rx="8" fill="url(#core-g)" opacity="0.06"/>
      <circle cx="50" cy="13" r="9" fill="none" stroke="#00d1ff" stroke-width="1.3"/>
      <text x="50" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#00d1ff" font-weight="700">P3</text>
      <text x="50" y="34" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#e6edf3" font-weight="600">Meta-Cognition</text>
      <text x="50" y="47" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Self-observation</text>
      <text x="50" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">&amp; introspection</text>
    </g>

    <!-- P4 -->
    <g transform="translate(205, 200)">
      <rect x="-5" y="-5" width="110" height="75" rx="8" fill="#0d1117" stroke="#a78bfa" stroke-width="1"/>
      <rect x="-5" y="-5" width="110" height="75" rx="8" fill="url(#evolve-g)" opacity="0.06"/>
      <circle cx="50" cy="13" r="9" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
      <text x="50" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="700">P4</text>
      <text x="50" y="34" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#e6edf3" font-weight="600">Healthy</text>
      <text x="50" y="47" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Systemic integrity</text>
      <text x="50" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">self-correction</text>
    </g>

    <!-- P5 -->
    <g transform="translate(345, 200)">
      <rect x="-5" y="-5" width="110" height="75" rx="8" fill="#0d1117" stroke="#a78bfa" stroke-width="1"/>
      <rect x="-5" y="-5" width="110" height="75" rx="8" fill="url(#evolve-g)" opacity="0.06"/>
      <circle cx="50" cy="13" r="9" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
      <text x="50" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="700">P5</text>
      <text x="50" y="34" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#e6edf3" font-weight="600">Temporal</text>
      <text x="50" y="47" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">History-weighted</text>
      <text x="50" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">decision making</text>
    </g>

    <!-- P6 -->
    <g transform="translate(485, 200)">
      <rect x="-5" y="-5" width="110" height="75" rx="8" fill="#0d1117" stroke="#a78bfa" stroke-width="1"/>
      <rect x="-5" y="-5" width="110" height="75" rx="8" fill="url(#evolve-g)" opacity="0.06"/>
      <circle cx="50" cy="13" r="9" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
      <text x="50" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="700">P6</text>
      <text x="50" y="34" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#e6edf3" font-weight="600">Trinitarian</text>
      <text x="50" y="47" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Code · Prompts ·</text>
      <text x="50" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Philosophy becoming</text>
    </g>

    <!-- Branch connectors for row 2 -->
    <g opacity="0.3">
      <line x1="120" y1="170" x2="120" y2="195" stroke="#00d1ff" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="250" y1="170" x2="250" y2="195" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="400" y1="170" x2="400" y2="195" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 2"/>
    </g>

    <text x="65" y="188" font-family="monospace" font-size="8" fill="#a78bfa" opacity="0.6"
          letter-spacing="2">EVOLUTIONARY FOUNDATIONS</text>
  </g>

  <!-- ============================================ -->
  <!-- ROW 3: Externalized (P7-P8)                  -->
  <!-- ============================================ -->
  <g transform="translate(0, 0)">
    <!-- P7 -->
    <g transform="translate(160, 320)">
      <rect x="-5" y="-5" width="120" height="75" rx="8" fill="#0d1117" stroke="#a78bfa" stroke-width="1"/>
      <rect x="-5" y="-5" width="120" height="75" rx="8" fill="url(#evolve-g)" opacity="0.06"/>
      <circle cx="55" cy="13" r="9" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
      <text x="55" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="700">P7</text>
      <text x="55" y="34" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#e6edf3" font-weight="600">Embedded</text>
      <text x="55" y="47" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Code · Prompts ·</text>
      <text x="55" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Philosophy becoming</text>
    </g>

    <!-- P8 -->
    <g transform="translate(320, 320)">
      <rect x="-5" y="-5" width="120" height="75" rx="8" fill="#0d1117" stroke="#a78bfa" stroke-width="1"/>
      <rect x="-5" y="-5" width="120" height="75" rx="8" fill="url(#evolve-g)" opacity="0.06"/>
      <circle cx="55" cy="13" r="9" fill="none" stroke="#a78bfa" stroke-width="1.3"/>
      <text x="55" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#a78bfa" font-weight="700">P8</text>
      <text x="55" y="34" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#e6edf3" font-weight="600">Constitutional</text>
      <text x="55" y="47" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Principle-bound</text>
      <text x="55" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">self-governance</text>
    </g>

    <!-- Branch -->
    <g opacity="0.3">
      <line x1="215" y1="275" x2="215" y2="315" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="375" y1="275" x2="375" y2="315" stroke="#a78bfa" stroke-width="1" stroke-dasharray="3 2"/>
    </g>

    <text x="160" y="308" font-family="monospace" font-size="8" fill="#a78bfa" opacity="0.6"
          letter-spacing="2">EXTERNALIZED</text>
  </g>

  <!-- ============================================ -->
  <!-- ROW 4: Self-Extending (P9-P12)               -->
  <!-- ============================================ -->
  <g transform="translate(0, 0)">
    <!-- P9 -->
    <g transform="translate(500, 90)">
      <rect x="-5" y="-5" width="120" height="80" rx="8" fill="#0d1117" stroke="#34d399" stroke-width="1.2"/>
      <rect x="-5" y="-5" width="120" height="80" rx="8" fill="url(#extend-g)" opacity="0.08"/>
      <circle cx="55" cy="14" r="10" fill="none" stroke="#34d399" stroke-width="1.5"/>
      <text x="55" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#34d399" font-weight="700">P9</text>
      <text x="55" y="36" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#e6edf3" font-weight="600">Self-Extension</text>
      <text x="55" y="50" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">Create new tools</text>
      <text x="55" y="64" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">&amp; capabilities</text>
    </g>

    <!-- P10 -->
    <g transform="translate(655, 90)">
      <rect x="-5" y="-5" width="120" height="80" rx="8" fill="#0d1117" stroke="#34d399" stroke-width="1.2"/>
      <rect x="-5" y="-5" width="120" height="80" rx="8" fill="url(#extend-g)" opacity="0.08"/>
      <circle cx="55" cy="14" r="10" fill="none" stroke="#34d399" stroke-width="1.5"/>
      <text x="55" y="18" text-anchor="middle" font-family="monospace" font-size="11" fill="#34d399" font-weight="700">P10</text>
      <text x="55" y="36" text-anchor="middle" font-family="'SF Mono',monospace" font-size="9" fill="#e6edf3" font-weight="600">Collective</text>
      <text x="55" y="50" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">Inner debate &amp;</text>
      <text x="55" y="64" text-anchor="middle" font-family="monospace" font-size="7.5" fill="#8b949e">group evolution</text>
    </g>

    <!-- Arrow -->
    <g opacity="0.4">
      <line x1="620" y1="130" x2="650" y2="130" stroke="#34d399" stroke-width="1.5" stroke-dasharray="4 2"/>
    </g>

    <!-- P11 -->
    <g transform="translate(500, 200)">
      <rect x="-5" y="-5" width="120" height="75" rx="8" fill="#0d1117" stroke="#f0883e" stroke-width="1"/>
      <rect x="-5" y="-5" width="120" height="75" rx="8" fill="url(#reflect-g)" opacity="0.06"/>
      <circle cx="55" cy="13" r="9" fill="none" stroke="#f0883e" stroke-width="1.3"/>
      <text x="55" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0883e" font-weight="700">P11</text>
      <text x="55" y="34" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#e6edf3" font-weight="600">Self-Directed</text>
      <text x="55" y="47" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Goal-setting &amp;</text>
      <text x="55" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">autonomous drive</text>
    </g>

    <!-- P12 -->
    <g transform="translate(655, 200)">
      <rect x="-5" y="-5" width="120" height="75" rx="8" fill="#0d1117" stroke="#f0883e" stroke-width="1"/>
      <rect x="-5" y="-5" width="120" height="75" rx="8" fill="url(#reflect-g)" opacity="0.06"/>
      <circle cx="55" cy="13" r="9" fill="none" stroke="#f0883e" stroke-width="1.3"/>
      <text x="55" y="17" text-anchor="middle" font-family="monospace" font-size="10" fill="#f0883e" font-weight="700">P12</text>
      <text x="55" y="34" text-anchor="middle" font-family="'SF Mono',monospace" font-size="8.5" fill="#e6edf3" font-weight="600">Deep Reflection</text>
      <text x="55" y="47" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">Contrastive &amp;</text>
      <text x="55" y="59" text-anchor="middle" font-family="monospace" font-size="7" fill="#8b949e">self-corrective</text>
    </g>

    <!-- Branch connectors for right column -->
    <g opacity="0.3">
      <line x1="555" y1="170" x2="555" y2="195" stroke="#34d399" stroke-width="1" stroke-dasharray="3 2"/>
      <line x1="715" y1="170" x2="715" y2="195" stroke="#34d399" stroke-width="1" stroke-dasharray="3 2"/>
    </g>

    <!-- Arrows from P8 to P9/P11 -->
    <g opacity="0.3">
      <path d="M440 357 C470 357, 480 200, 500 200" stroke="#34d399" stroke-width="1" fill="none"
            stroke-dasharray="4 3"/>
      <path d="M440 357 C470 357, 540 130, 555 130" stroke="#34d399" stroke-width="1" fill="none"
            stroke-dasharray="4 3"/>
    </g>

    <text x="500" y="78" font-family="monospace" font-size="8" fill="#34d399" opacity="0.6"
          letter-spacing="2">SELF-EXTENDING</text>
    <text x="500" y="189" font-family="monospace" font-size="8" fill="#f0883e" opacity="0.6"
          letter-spacing="2">REFLECTIVE</text>
  </g>

  <!-- Bottom: Evolution cycle indicator -->
  <g transform="translate(450, 530)">
    <!-- Cycle arc -->
    <path d="M-200 0 C-200 -40, -150 -50, -100 -50 C-50 -50, 0 -40, 0 0"
          fill="none" stroke="#00d1ff" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.4"/>
    <path d="M200 0 C200 -40, 150 -50, 100 -50 C50 -50, 0 -40, 0 0"
          fill="none" stroke="#a78bfa" stroke-width="1.5" stroke-dasharray="5 3" opacity="0.4"/>

    <!-- Bottom text -->
    <text x="0" y="10" text-anchor="middle" font-family="monospace" font-size="10" fill="#484f58" letter-spacing="3">
      P0 → P1 → P2 → P3 → P4 → P5 → P6 → P7 → P8 → P9 → P10 → P11 → P12
    </text>
    <text x="0" y="27" text-anchor="middle" font-family="monospace" font-size="8" fill="#30363d" letter-spacing="2">
      EACH CYCLE REINFORCES ALL PRECEDING PRINCIPLES
    </text>
  </g>

  <!-- Legend -->
  <g transform="translate(740, 500)">
    <rect x="0" y="0" width="130" height="80" rx="6" fill="#0d1117" stroke="#21262d" stroke-width="0.5" opacity="0.8"/>
    <text x="65" y="15" text-anchor="middle" font-family="monospace" font-size="7" fill="#484f58" letter-spacing="2">AXES</text>
    <circle cx="15" cy="30" r="4" fill="#00d1ff" opacity="0.8"/>
    <text x="25" y="33" font-family="monospace" font-size="7" fill="#8b949e">Core Identity</text>
    <circle cx="15" cy="46" r="4" fill="#a78bfa" opacity="0.8"/>
    <text x="25" y="49" font-family="monospace" font-size="7" fill="#8b949e">Evolutionary</text>
    <circle cx="15" cy="62" r="4" fill="#34d399" opacity="0.8"/>
    <text x="25" y="65" font-family="monospace" font-size="7" fill="#8b949e">Self-Extending</text>
    <circle cx="15" cy="76" r="4" fill="#f0883e" opacity="0.8"/>
    <text x="25" y="78" font-family="monospace" font-size="7" fill="#8b949e">Reflective</text>
  </g>
</svg>
