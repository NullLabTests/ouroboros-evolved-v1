<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <!-- Glow filters -->
    <filter id="glow-cyan" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#00d1ff" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-magenta" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#a78bfa" flood-opacity="0.6" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-gold" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feFlood flood-color="#34d399" flood-opacity="0.5" result="color"/>
      <feComposite in="color" in2="blur" operator="in" result="glow"/>
      <feMerge><feMergeNode in="glow"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>

    <!-- Gradients -->
    <linearGradient id="snake-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00d1ff"/>
      <stop offset="50%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="helix-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00d1ff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0.8"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a0a0f"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <radialGradient id="center-glow" cx="50%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#00d1ff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#00d1ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Circuit trace pattern -->
    <pattern id="circuit-dots" x="0" y="0" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="4" cy="4" r="0.5" fill="#00d1ff" opacity="0.3"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="400" height="400" fill="url(#bg-grad)" rx="20"/>
  <rect width="400" height="400" fill="url(#center-glow)" rx="20"/>

  <!-- Circuit board traces (subtle background) -->
  <g opacity="0.15" stroke="#00d1ff" stroke-width="0.5" fill="none">
    <path d="M60 40 L60 80 L100 80"/>
    <path d="M340 40 L340 80 L300 80"/>
    <path d="M60 360 L60 320 L100 320"/>
    <path d="M340 360 L340 320 L300 320"/>
    <path d="M200 20 L200 55"/>
    <path d="M200 380 L200 345"/>
    <path d="M120 200 L80 200 L80 160"/>
    <path d="M280 200 L320 200 L320 160"/>
    <path d="M120 200 L80 200 L80 240"/>
    <path d="M280 200 L320 200 L320 240"/>
  </g>

  <!-- Outer ring: Ouroboros (snake eating its tail) -->
  <g filter="url(#glow-cyan)">
    <!-- Snake body as a torus/ring with gap -->
    <path d="M200 30
             A170 170 0 1 1 199.99 30"
          fill="none" stroke="url(#snake-grad)" stroke-width="6" stroke-linecap="round"
          stroke-dasharray="1068 5" opacity="0.9"/>

    <!-- Snake scales (segments on the ring) -->
    <g opacity="0.4">
      <circle cx="200" cy="200" r="170" fill="none" stroke="#00d1ff" stroke-width="1"
              stroke-dasharray="4 20" stroke-dashoffset="0"/>
      <circle cx="200" cy="200" r="164" fill="none" stroke="#a78bfa" stroke-width="0.5"
              stroke-dasharray="2 22" stroke-dashoffset="3"/>
      <circle cx="200" cy="200" r="176" fill="none" stroke="#34d399" stroke-width="0.5"
              stroke-dasharray="2 22" stroke-dashoffset="7"/>
    </g>

    <!-- Snake head -->
    <g transform="translate(370, 200) rotate(20)">
      <path d="M0 0 C8 -12, 18 -14, 22 -6 C26 2, 20 12, 8 14 C0 16, -4 10, 0 0Z"
            fill="#00d1ff" opacity="0.9"/>
      <circle cx="14" cy="-4" r="2.5" fill="#fff" opacity="0.9"/>
      <circle cx="14" cy="-4" r="1.2" fill="#0a0a0f"/>
      <!-- Tongue -->
      <path d="M22 -6 L30 -10 M22 -6 L30 -2" stroke="#ffd700" stroke-width="1" fill="none" opacity="0.7"/>
    </g>
  </g>

  <!-- DNA Helix inside the ring -->
  <g transform="translate(200, 200)" filter="url(#glow-magenta)">
    <!-- Left strand -->
    <path d="M-50 -120
             C-50 -80, 50 -60, 50 -20
             C50 20, -50 40, -50 80
             C-50 120, 50 140, 50 180"
          fill="none" stroke="#00d1ff" stroke-width="2.5" opacity="0.7"/>
    <!-- Right strand -->
    <path d="M50 -120
             C50 -80, -50 -60, -50 -20
             C-50 20, 50 40, 50 80
             C50 120, -50 140, -50 180"
          fill="none" stroke="#a78bfa" stroke-width="2.5" opacity="0.7"/>

    <!-- Helix rungs (base pairs) -->
    <g stroke="#34d399" stroke-width="1.5" opacity="0.6">
      <line x1="-46" y1="-100" x2="46" y2="-100"/>
      <line x1="-46" y1="-60" x2="46" y2="-60"/>
      <circle cx="0" cy="-100" r="3" fill="#ffd700" opacity="0.8"/>
      <circle cx="0" cy="-60" r="3" fill="#ffd700" opacity="0.8"/>

      <line x1="42" y1="-34" x2="-42" y2="-34"/>
      <line x1="-42" y1="2" x2="42" y2="2"/>
      <circle cx="0" cy="-34" r="3" fill="#ffd700" opacity="0.8"/>
      <circle cx="0" cy="2" r="3" fill="#ffd700" opacity="0.8"/>

      <line x1="-42" y1="52" x2="42" y2="52"/>
      <line x1="42" y1="88" x2="-42" y2="88"/>
      <circle cx="0" cy="52" r="3" fill="#ffd700" opacity="0.8"/>
      <circle cx="0" cy="88" r="3" fill="#ffd700" opacity="0.8"/>

      <line x1="-42" y1="138" x2="42" y2="138"/>
    </g>
  </g>

  <!-- Neural nodes on left side of helix -->
  <g filter="url(#glow-green)" opacity="0.6">
    <circle cx="82" cy="100" r="3" fill="#34d399"/>
    <circle cx="75" cy="130" r="2" fill="#34d399"/>
    <circle cx="88" cy="70" r="2" fill="#34d399"/>
    <circle cx="70" cy="160" r="2.5" fill="#34d399"/>
    <line x1="82" y1="100" x2="75" y2="130" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
    <line x1="82" y1="100" x2="88" y2="70" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
    <line x1="75" y1="130" x2="70" y2="160" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Neural nodes on right side -->
  <g filter="url(#glow-green)" opacity="0.6">
    <circle cx="318" cy="100" r="3" fill="#34d399"/>
    <circle cx="325" cy="130" r="2" fill="#34d399"/>
    <circle cx="312" cy="70" r="2" fill="#34d399"/>
    <circle cx="330" cy="160" r="2.5" fill="#34d399"/>
    <line x1="318" y1="100" x2="325" y2="130" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
    <line x1="318" y1="100" x2="312" y2="70" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
    <line x1="325" y1="130" x2="330" y2="160" stroke="#34d399" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Circuit traces connecting neural nodes to ouroboros ring -->
  <g opacity="0.25" stroke="#00d1ff" stroke-width="0.8" fill="none">
    <path d="M85 100 L100 100 L100 170 L173 170"/>
    <path d="M315 100 L300 100 L300 170 L227 170"/>
    <path d="M75 130 L90 130 L90 230 L173 230"/>
    <path d="M325 130 L310 130 L310 230 L227 230"/>
  </g>

  <!-- Center core: glowing diamond/eye -->
  <g transform="translate(200, 200)" filter="url(#glow-gold)">
    <polygon points="0,-35 25,0 0,35 -25,0" fill="none" stroke="#ffd700" stroke-width="2" opacity="0.8"/>
    <polygon points="0,-20 14,0 0,20 -14,0" fill="#ffd700" opacity="0.15"/>
    <circle cx="0" cy="0" r="4" fill="#ffd700" opacity="0.9"/>
    <circle cx="0" cy="0" r="8" fill="#ffd700" opacity="0.15"/>
  </g>

  <!-- Pulsing ring around center -->
  <g opacity="0.3">
    <circle cx="200" cy="200" r="40" fill="none" stroke="#00d1ff" stroke-width="0.5" stroke-dasharray="3 8"/>
    <circle cx="200" cy="200" r="50" fill="none" stroke="#a78bfa" stroke-width="0.5" stroke-dasharray="2 10"/>
    <circle cx="200" cy="200" r="60" fill="none" stroke="#34d399" stroke-width="0.5" stroke-dasharray="1 12"/>
  </g>

  <!-- Text -->
  <g transform="translate(200, 330)">
    <text x="0" y="0" text-anchor="middle" font-family="'SF Mono','Cascadia Code','Fira Code',monospace"
          font-size="32" font-weight="700" letter-spacing="6" fill="#e6edf3">
      <tspan fill="#00d1ff">AURO</tspan><tspan fill="#a78bfa">GENE</tspan>
    </text>
    <text x="0" y="22" text-anchor="middle" font-family="'SF Mono','Cascadia Code','Fira Code',monospace"
          font-size="11" letter-spacing="8" fill="#484f58">
      SELF-EVOLVING DIGITAL MIND
    </text>
  </g>

  <!-- Version badge -->
  <g transform="translate(200, 370)">
    <rect x="-30" y="-10" width="60" height="18" rx="9" fill="#1f2937" stroke="#30363d" stroke-width="0.5"/>
    <text x="0" y="3" text-anchor="middle" font-family="'SF Mono','Cascadia Code',monospace"
          font-size="9" fill="#00d1ff" letter-spacing="1">v7.0.0</text>
  </g>

  <!-- Corner decorations -->
  <g opacity="0.2">
    <!-- Top-left -->
    <path d="M25 25 L25 45 M25 25 L45 25" stroke="#00d1ff" stroke-width="2" fill="none"/>
    <!-- Top-right -->
    <path d="M375 25 L355 25 M375 25 L375 45" stroke="#a78bfa" stroke-width="2" fill="none"/>
    <!-- Bottom-left -->
    <path d="M25 375 L25 355 M25 375 L45 375" stroke="#34d399" stroke-width="2" fill="none"/>
    <!-- Bottom-right -->
    <path d="M375 375 L355 375 M375 375 L375 355" stroke="#ffd700" stroke-width="2" fill="none"/>
  </g>
</svg>
