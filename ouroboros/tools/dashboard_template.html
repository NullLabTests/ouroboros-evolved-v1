<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aurogene Evolution Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#0d1117;color:#e6edf3;min-height:100vh;padding:24px}
h1{font-size:28px;font-weight:700;margin-bottom:4px;background:linear-gradient(135deg,#00d1ff,#a78bfa,#34d399);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.sub{color:#8b949e;font-size:13px;margin-bottom:24px}
.dashboard{max-width:1400px;margin:0 auto}
.card{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:20px;margin-bottom:20px}
.card h2{font-size:16px;color:#00d1ff;margin-bottom:14px;font-weight:600}
.chart-row{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.chart-full{grid-column:1/-1}
canvas{width:100%!important;max-height:350px}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:12px;margin-bottom:20px}
.stat-card{background:#0d1117;border:1px solid #21262d;border-radius:8px;padding:14px;text-align:center}
.stat-icon{font-size:22px;margin-bottom:4px}
.stat-label{font-size:11px;color:#8b949e;margin-bottom:4px}
.stat-val{font-weight:700;font-size:15px;color:#e6edf3}
.stat-sub{font-size:10px;color:#58a6ff;margin-top:2px}
.stat-sub.green{color:#34d399}
.stat-sub.red{color:#f85149}
.stat-sub.orange{color:#d29922}
.legend-row{display:flex;gap:16px;flex-wrap:wrap;font-size:12px;color:#8b949e;margin-bottom:12px}
.last-updated{text-align:right;font-size:11px;color:#484f58;margin-top:12px}
@media(max-width:800px){.chart-row{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="dashboard">
  <h1>🧬 Aurogene Evolution Dashboard</h1>
  <p class="sub" id="subtitle">Loading evolution data from git history…</p>

  <div id="stats-container" class="stats-grid"></div>

  <div class="chart-row">
    <div class="card chart-full">
      <h2>📈 Growth Over Time</h2>
      <div class="legend-row" id="growth-legend"></div>
      <canvas id="chart-growth"></canvas>
    </div>
  </div>

  <div class="chart-row">
    <div class="card">
      <h2>🧰 Capability Accumulation</h2>
      <p style="font-size:12px;color:#8b949e;margin-bottom:10px">Tools, tests, principles & modules over time</p>
      <canvas id="chart-capabilities"></canvas>
    </div>
    <div class="card">
      <h2>💨 Improvement Velocity</h2>
      <p style="font-size:12px;color:#8b949e;margin-bottom:10px">Lines added / removed between each snapshot</p>
      <canvas id="chart-velocity"></canvas>
    </div>
  </div>

  <div class="card chart-full">
    <h2>📊 Self-Concept Breakdown</h2>
    <div class="legend-row" id="concept-legend"></div>
    <canvas id="chart-concept"></canvas>
  </div>

  <div class="card" style="padding:12px 20px">
    <div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px">
      <span style="font-size:12px;color:#8b949e">
        ⚡ <span id="version-count">0</span> version milestones ·
        <span id="snapshot-count">0</span> snapshots
      </span>
      <span id="last-updated" class="last-updated" style="margin-top:0"></span>
    </div>
  </div>
</div>

<script>
let charts = {};

function fmtDate(ts) {
  const d = new Date(ts);
  return d.toLocaleDateString('en-US', {month: 'short', day: 'numeric'});
}

function fmtFull(ts) {
  return new Date(ts).toLocaleDateString('en-US', {year:'numeric',month:'short',day:'numeric'});
}

function getVersionMarkers(pts) {
  return pts.filter(p => p.version).map(p => ({
    value: pts.indexOf(p),
    text: 'v' + p.version
  }));
}

function buildGrowthChart(canvasId, pts, isDark) {
  const labels = pts.map(p => fmtDate(p.ts));
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#8b949e' : '#6b7280';

  const versionMarkers = getVersionMarkers(pts);
  const plugin = versionMarkers.length ? {
    id: 'versionMarkers',
    afterDraw(chart) {
      const ctx = chart.ctx;
      const meta = chart.getDatasetMeta(0);
      if (!meta.data || !meta.data.length) return;
      versionMarkers.forEach(({value, text}) => {
        if (value >= meta.data.length) return;
        const pt = meta.data[value];
        ctx.save();
        ctx.fillStyle = 'rgba(255,255,255,0.85)';
        ctx.font = '9px monospace';
        ctx.textAlign = 'center';
        ctx.fillText('◆', pt.x, pt.y - 10);
        ctx.restore();
      });
    }
  } : {};

  return new Chart(document.getElementById(canvasId).getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'Lines of Code',
          data: pts.map(p => p.py_lines),
          borderColor: '#00d1ff',
          backgroundColor: 'rgba(0,209,255,0.06)',
          tension: 0.3, fill: true, pointRadius: 2, borderWidth: 2,
          yAxisID: 'y',
        },
        {
          label: 'Bible (KB)',
          data: pts.map(p => +(p.bible_bytes/1024).toFixed(2)),
          borderColor: '#a78bfa',
          backgroundColor: 'rgba(167,139,250,0.05)',
          tension: 0.3, fill: false, pointRadius: 2, borderWidth: 2,
          yAxisID: 'y1',
          hidden: true,
        },
        {
          label: 'System (KB)',
          data: pts.map(p => +(p.system_bytes/1024).toFixed(2)),
          borderColor: '#34d399',
          backgroundColor: 'rgba(52,211,153,0.05)',
          tension: 0.3, fill: false, pointRadius: 2, borderWidth: 2,
          yAxisID: 'y1',
          hidden: true,
        },
        {
          label: 'Consciousness (KB)',
          data: pts.map(p => p.consciousness_bytes ? +(p.consciousness_bytes/1024).toFixed(2) : null),
          borderColor: '#f0883e',
          backgroundColor: 'rgba(240,136,62,0.05)',
          tension: 0.3, fill: false, pointRadius: 2, borderWidth: 2,
          borderDash: [5, 3],
          yAxisID: 'y1',
          hidden: true,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { color: textColor, font: {size: 11}, boxWidth: 14, padding: 12 },
        },
        tooltip: {
          callbacks: {
            title(items) {
              const p = pts[items[0].dataIndex];
              const v = p.version ? ` [v${p.version}]` : '';
              return `${fmtFull(p.ts)}${v}`;
            },
            label(ctx) {
              const p = pts[ctx.dataIndex];
              let label = ctx.dataset.label + ': ';
              if (ctx.dataset.yAxisID === 'y1') {
                label += ctx.parsed.y + ' KB';
              } else {
                label += ctx.parsed.y.toLocaleString();
              }
              if (ctx.datasetIndex === 0) {
                const prev = ctx.dataIndex > 0 ? pts[ctx.dataIndex - 1] : null;
                if (prev) {
                  const delta = p.py_lines - prev.py_lines;
                  label += ` (${delta >= 0 ? '+' : ''}${delta.toLocaleString()})`;
                }
              }
              return label;
            },
            afterBody(items) {
              const p = pts[items[0].dataIndex];
              return `📦 ${p.msg.slice(0, 60)}`;
            },
          },
        },
      },
      scales: {
        x: {
          ticks: { color: textColor, maxTicksLimit: 14, maxRotation: 25, font: {size: 10} },
          grid: { color: gridColor },
        },
        y: {
          type: 'linear', position: 'left',
          ticks: { color: '#00d1ff', font: {size: 10} },
          grid: { color: gridColor },
          title: { display: true, text: 'Lines of Code', color: '#00d1ff', font: {size: 10} },
        },
        y1: {
          type: 'linear', position: 'right',
          ticks: { color: '#a78bfa', font: {size: 10} },
          grid: { drawOnChartArea: false },
          title: { display: true, text: 'KB', color: '#a78bfa', font: {size: 10} },
        },
      },
    },
    plugins: [plugin],
  });
}

function buildCapabilitiesChart(canvasId, pts, isDark) {
  const labels = pts.map(p => fmtDate(p.ts));
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#8b949e' : '#6b7280';

  return new Chart(document.getElementById(canvasId).getContext('2d'), {
    type: 'bar',
    data: {
      labels,
      datasets: [
        {
          label: 'Tools',
          data: pts.map(p => p.tool_count ?? 0),
          backgroundColor: 'rgba(0,209,255,0.6)',
          borderColor: '#00d1ff',
          borderWidth: 1,
          borderRadius: 2,
        },
        {
          label: 'Tests',
          data: pts.map(p => p.test_count ?? 0),
          backgroundColor: 'rgba(52,211,153,0.6)',
          borderColor: '#34d399',
          borderWidth: 1,
          borderRadius: 2,
        },
        {
          label: 'Principles',
          data: pts.map(p => p.principle_count ?? 0),
          backgroundColor: 'rgba(167,139,250,0.6)',
          borderColor: '#a78bfa',
          borderWidth: 1,
          borderRadius: 2,
        },
        {
          label: 'Modules',
          data: pts.map(p => p.module_count ?? 0),
          backgroundColor: 'rgba(240,136,62,0.6)',
          borderColor: '#f0883e',
          borderWidth: 1,
          borderRadius: 2,
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { color: textColor, font: {size: 10}, boxWidth: 12, padding: 10 },
        },
        tooltip: {
          callbacks: {
            title(items) {
              const p = pts[items[0].dataIndex];
              const v = p.version ? ` [v${p.version}]` : '';
              return `${fmtFull(p.ts)}${v}`;
            },
          },
        },
      },
      scales: {
        x: {
          ticks: { color: textColor, maxTicksLimit: 12, maxRotation: 25, font: {size: 9} },
          grid: { color: gridColor },
        },
        y: {
          beginAtZero: true,
          ticks: { color: textColor, font: {size: 10}, precision: 0 },
          grid: { color: gridColor },
        },
      },
    },
  });
}

function buildVelocityChart(canvasId, pts, isDark) {
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#8b949e' : '#6b7280';

  const deltas = [];
  const dLabels = [];
  for (let i = 1; i < pts.length; i++) {
    deltas.push(pts[i].py_lines - pts[i-1].py_lines);
    dLabels.push(fmtDate(pts[i].ts));
  }

  const colors = deltas.map(d => d >= 0 ? 'rgba(52,211,153,0.7)' : 'rgba(248,81,73,0.7)');
  const borderColors = deltas.map(d => d >= 0 ? '#34d399' : '#f85149');

  return new Chart(document.getElementById(canvasId).getContext('2d'), {
    type: 'bar',
    data: {
      labels: dLabels,
      datasets: [{
        label: 'Δ Lines',
        data: deltas,
        backgroundColor: colors,
        borderColor: borderColors,
        borderWidth: 1,
        borderRadius: 2,
      }],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            title(items) {
              const idx = items[0].dataIndex + 1;
              const p = pts[idx];
              return `${fmtFull(p.ts)}${p.version ? ' [v'+p.version+']' : ''}`;
            },
            label(ctx) {
              const sign = ctx.parsed.y >= 0 ? '+' : '';
              return `${sign}${ctx.parsed.y.toLocaleString()} lines`;
            },
          },
        },
      },
      scales: {
        x: {
          ticks: { color: textColor, maxTicksLimit: 12, maxRotation: 25, font: {size: 9} },
          grid: { color: gridColor },
        },
        y: {
          ticks: { color: textColor, font: {size: 10} },
          grid: { color: gridColor },
        },
      },
    },
  });
}

function buildConceptChart(canvasId, pts, isDark) {
  const labels = pts.map(p => fmtDate(p.ts));
  const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.06)';
  const textColor = isDark ? '#8b949e' : '#6b7280';

  return new Chart(document.getElementById(canvasId).getContext('2d'), {
    type: 'line',
    data: {
      labels,
      datasets: [
        {
          label: 'BIBLE.md',
          data: pts.map(p => p.bible_bytes),
          borderColor: '#a78bfa',
          backgroundColor: 'rgba(167,139,250,0.08)',
          tension: 0.3, fill: true, pointRadius: 2, borderWidth: 2,
        },
        {
          label: 'SYSTEM.md',
          data: pts.map(p => p.system_bytes),
          borderColor: '#34d399',
          backgroundColor: 'rgba(52,211,153,0.08)',
          tension: 0.3, fill: true, pointRadius: 2, borderWidth: 2,
        },
        {
          label: 'CONSCIOUSNESS.md',
          data: pts.map(p => p.consciousness_bytes ?? null),
          borderColor: '#f0883e',
          backgroundColor: 'rgba(240,136,62,0.08)',
          tension: 0.3, fill: true, pointRadius: 2, borderWidth: 2,
          borderDash: [4, 3],
        },
      ],
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: {
          position: 'top',
          labels: { color: textColor, font: {size: 11}, boxWidth: 14, padding: 12 },
        },
        tooltip: {
          callbacks: {
            title(items) {
              const p = pts[items[0].dataIndex];
              const v = p.version ? ` [v${p.version}]` : '';
              const msgs = p.msg ? ` — ${p.msg.slice(0, 50)}` : '';
              return `${fmtFull(p.ts)}${v}${msgs}`;
            },
            label(ctx) {
              const v = ctx.parsed.y;
              if (v >= 1024) return ctx.dataset.label + ': ' + (v/1024).toFixed(2) + ' KB';
              return ctx.dataset.label + ': ' + v + ' B';
            },
          },
        },
      },
      scales: {
        x: {
          ticks: { color: textColor, maxTicksLimit: 12, maxRotation: 25, font: {size: 10} },
          grid: { color: gridColor },
        },
        y: {
          ticks: {
            color: textColor, font: {size: 10},
            callback: v => v >= 1024 ? (v/1024).toFixed(1)+'KB' : v+'B',
          },
          grid: { color: gridColor },
        },
      },
    },
  });
}

function buildStats(pts, data) {
  if (!pts || pts.length < 2) return '<div class="stat-card">Not enough data</div>';
  const first = pts[0], last = pts[pts.length - 1];

  const codeMult = last.py_lines / Math.max(first.py_lines, 1);
  const codeDelta = last.py_lines - first.py_lines;
  const codeDeltaStr = (codeDelta >= 0 ? '+' : '') + codeDelta.toLocaleString();

  const toolDelta = (last.tool_count ?? 0) - (first.tool_count ?? 0);
  const testDelta = (last.test_count ?? 0) - (first.test_count ?? 0);
  const moduleDelta = (last.module_count ?? 0) - (first.module_count ?? 0);

  const bibleDelta = ((last.bible_bytes - first.bible_bytes) / 1024).toFixed(1);
  const systemKb = (last.system_bytes / 1024).toFixed(1);

  const spanDays = Math.round((new Date(last.ts) - new Date(first.ts)) / 86400000);

  const versionPts = pts.filter(p => p.version);
  const versions = versionPts.length;

  const recentGrowth = pts.length >= 5
    ? pts[pts.length-1].py_lines - pts[pts.length-5].py_lines
    : 0;
  const recentGrowthStr = (recentGrowth >= 0 ? '+' : '') + recentGrowth.toLocaleString();

  return [
    ['📏', 'Code Growth',     `${first.py_lines.toLocaleString()} → ${last.py_lines.toLocaleString()}`, `${codeDeltaStr} lines (×${codeMult.toFixed(1)})`],
    ['🧠', 'System Prompt',    `${(first.system_bytes/1024).toFixed(1)} → ${systemKb} KB`, `+${((last.system_bytes-first.system_bytes)/1024).toFixed(1)} KB self-concept`],
    ['📖', 'BIBLE.md',         `${(first.bible_bytes/1024).toFixed(1)} → ${(last.bible_bytes/1024).toFixed(1)} KB`, `+${bibleDelta} KB philosophy`],
    ['🛠️', 'Tools',            `${first.tool_count ?? 0} → ${last.tool_count ?? 0}`, toolDelta >= 0 ? `+${toolDelta} tools` : `${toolDelta} tools`],
    ['🧪', 'Tests',            `${first.test_count ?? 0} → ${last.test_count ?? 0}`, testDelta >= 0 ? `+${testDelta} tests` : `${testDelta} tests`],
    ['📦', 'Modules',          `${first.module_count} → ${last.module_count}`, moduleDelta >= 0 ? `+${moduleDelta} modules` : `${moduleDelta} modules`],
    ['🏷️', 'Versions',         `${versions} releases`, `${pts.length} snapshots over ${spanDays}d`],
    ['⚡', 'Recent Velocity',  `Last 5 snapshots`, `${recentGrowthStr} lines`],
  ].map(([icon, label, val, sub]) => `
    <div class="stat-card">
      <div class="stat-icon">${icon}</div>
      <div class="stat-label">${label}</div>
      <div class="stat-val">${val}</div>
      <div class="stat-sub">${sub}</div>
    </div>`).join('');
}

async function loadDashboard() {
  try {
    const url = window.location.pathname.includes('dashboard.html')
      ? 'evolution.json'
      : `evolution.json?t=${Date.now()}`;
    const r = await fetch(url);
    if (!r.ok) throw new Error(`HTTP ${r.status}`);
    const data = await r.json();
    const pts = data.points;
    if (!pts || pts.length < 2) throw new Error('Need ≥2 data points');

    document.getElementById('subtitle').textContent =
      `${fmtFull(pts[0].ts)} → ${fmtFull(pts[pts.length-1].ts)} · ` +
      `${pts.length} snapshots · ${pts.filter(p=>p.version).length} versions`;

    document.getElementById('snapshot-count').textContent = pts.length;
    document.getElementById('version-count').textContent = pts.filter(p=>p.version).length;
    document.getElementById('last-updated').textContent =
      `Updated ${data.generated_at ? new Date(data.generated_at).toLocaleString() : 'unknown'}`;

    const isDark = true;

    document.getElementById('stats-container').innerHTML = buildStats(pts, data);

    charts.growth = buildGrowthChart('chart-growth', pts, isDark);
    charts.capabilities = buildCapabilitiesChart('chart-capabilities', pts, isDark);
    charts.velocity = buildVelocityChart('chart-velocity', pts, isDark);
    charts.concept = buildConceptChart('chart-concept', pts, isDark);

  } catch(e) {
    document.getElementById('subtitle').textContent = '⚠ Error: ' + e.message;
    console.error('Dashboard error:', e);
  }
}

document.addEventListener('DOMContentLoaded', loadDashboard);
</script>
</body>
</html>
